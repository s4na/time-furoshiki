name: CI

on:
  push:
    branches:
      - main
      - feat/initial-implementation
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.2'
          - '3.3'

    name: Ruby ${{ matrix.ruby }}
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    
    - name: Run tests
      run: bundle exec rspec --format documentation
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: matrix.ruby == '3.3'
      with:
        file: ./coverage/coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true
    
    - name: Run RuboCop
      run: bundle exec rubocop

  test_ruby_27:
    runs-on: ubuntu-latest
    name: Ruby 2.7 (compatibility)
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '2.7'
        bundler-cache: true
    
    - name: Run tests
      run: bundle exec rspec --format documentation
      continue-on-error: true
